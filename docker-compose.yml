services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./data/sessions:/app/data/sessions
      - ./data/logs:/app/data/logs
      # Same knowledge corpus as host (ingest + RAG tooling see KNOWLEDGE_DIR, default data/knowledge).
      - ./data/knowledge:/app/data/knowledge
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_LAB_BASE_URL: ${NEXT_PUBLIC_LAB_BASE_URL:-http://localhost:3100}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_LAB_BASE_URL: ${NEXT_PUBLIC_LAB_BASE_URL:-http://localhost:3100}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  lab:
    build:
      context: ./apps/vuln-lab
      dockerfile: Dockerfile
    environment:
      LAB_MODE: ${LAB_MODE:-vulnerable}
      LAB_HOST: 0.0.0.0
      LAB_PORT: ${LAB_PORT:-3100}
      # Always use Compose service DNS — do not inherit host .env (127.0.0.1 breaks from inside the container).
      CTI_API_BASE: http://api:8000
      CTI_BRIDGE_MODE: ${CTI_BRIDGE_MODE:-both}
      CTI_ANALYZE_MODE: ${CTI_ANALYZE_MODE:-g1}
      CTI_BATCH_SIZE: ${CTI_BATCH_SIZE:-8}
      CTI_FLUSH_MS: ${CTI_FLUSH_MS:-7000}
      # Lab Dockerfile only contains apps/vuln-lab; write logs to a mounted dir (see volumes).
      LAB_LOG_FILE: /lab-data/vuln_lab_events.jsonl
      LAB_DETECTION_FILE: /lab-data/vuln_lab_detections.jsonl
      LAB_SYSTEM_LOG_FILE: /lab-data/vuln_lab_system.log
    volumes:
      - ./data/logs:/lab-data
    ports:
      - "3100:3100"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
